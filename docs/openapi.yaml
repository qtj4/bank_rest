openapi: 3.0.3
info:
  title: Bank Card Management API
  version: v1
  description: Backend API for user, bank card, and transfer management.
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
paths:
  /api/v1/auth/register:
    post:
      tags: [Authentication]
      summary: Register a user account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /api/v1/auth/login:
    post:
      tags: [Authentication]
      summary: Login and receive a JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /api/v1/admin/users:
    post:
      tags: [Admin users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'
    get:
      tags: [Admin users]
      summary: List users
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - name: search
          in: query
          schema: { type: string }
        - name: role
          in: query
          schema: { $ref: '#/components/schemas/Role' }
        - name: enabled
          in: query
          schema: { type: boolean }
      responses:
        '200':
          description: Page of users
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /api/v1/admin/users/{id}:
    get:
      tags: [Admin users]
      summary: Get user by id
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
    put:
      tags: [Admin users]
      summary: Update user
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: Updated
    delete:
      tags: [Admin users]
      summary: Disable user
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: Disabled
  /api/v1/cards:
    post:
      tags: [Cards]
      summary: Create card for a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /api/v1/cards/all:
    get:
      tags: [Cards]
      summary: List all cards as admin
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/CardStatus' }
        - name: ownerId
          in: query
          schema: { type: string, format: uuid }
        - name: lastFourDigits
          in: query
          schema: { type: string, example: '1234' }
      responses:
        '200':
          description: Page of cards
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /api/v1/cards/my:
    get:
      tags: [Cards]
      summary: List current user's cards
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/CardStatus' }
        - name: lastFourDigits
          in: query
          schema: { type: string, example: '1234' }
      responses:
        '200':
          description: Page of cards
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /api/v1/cards/{id}:
    get:
      tags: [Cards]
      summary: Get card as admin
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Card
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    put:
      tags: [Cards]
      summary: Update card as admin
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardUpdateRequest'
      responses:
        '200':
          description: Updated
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags: [Cards]
      summary: Delete card or block it when transfer history exists
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: Deleted or blocked
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/cards/my/{id}:
    get:
      tags: [Cards]
      summary: Get current user's card
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Card
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/cards/{id}/balance:
    get:
      tags: [Cards]
      summary: Get current user's card balance
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Balance
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/cards/{id}/block:
    patch:
      tags: [Cards]
      summary: Block card as admin
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Blocked
        '400':
          $ref: '#/components/responses/BusinessError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/cards/{id}/activate:
    patch:
      tags: [Cards]
      summary: Activate card as admin
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Activated
        '400':
          $ref: '#/components/responses/BusinessError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/cards/{id}/block-request:
    post:
      tags: [Cards]
      summary: Request blocking for current user's card
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Block requested
        '400':
          $ref: '#/components/responses/BusinessError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/transfers:
    post:
      tags: [Transfers]
      summary: Transfer money between current user's own cards
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferRequest'
      responses:
        '201':
          description: Transfer created
        '400':
          $ref: '#/components/responses/BusinessError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/transfers/my:
    get:
      tags: [Transfers]
      summary: List current user's transfers
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: Page of transfers
        '400':
          $ref: '#/components/responses/BusinessError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /api/v1/transfers/{id}:
    get:
      tags: [Transfers]
      summary: Get current user's transfer
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Transfer
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/admin/transfers:
    get:
      tags: [Transfers]
      summary: List all transfers as admin
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - name: userId
          in: query
          schema: { type: string, format: uuid }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: Page of transfers
        '400':
          $ref: '#/components/responses/BusinessError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    page:
      name: page
      in: query
      schema:
        type: integer
        default: 0
    size:
      name: size
      in: query
      description: Page size is capped at 100 by the API.
      schema:
        type: integer
        default: 20
        maximum: 100
        minimum: 1
  responses:
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: VALIDATION_ERROR
            status: 400
            message: Validation failed
            fieldErrors:
              amount: must be a monetary value with up to 2 decimal places
            timestamp: '2026-07-08T12:00:00'
    UnauthorizedError:
      description: JWT is missing, expired, or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: UNAUTHORIZED
            status: 401
            message: Authentication is required
            timestamp: '2026-07-08T12:00:00'
    ForbiddenError:
      description: Authenticated principal does not have permission for the operation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: FORBIDDEN
            status: 403
            message: Access denied
            timestamp: '2026-07-08T12:00:00'
    NotFoundError:
      description: Resource was not found or is not visible to the caller
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: NOT_FOUND
            status: 404
            message: Card not found
            timestamp: '2026-07-08T12:00:00'
    ConflictError:
      description: Request conflicts with existing persisted data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: DATA_INTEGRITY_ERROR
            status: 409
            message: Card number already exists
            timestamp: '2026-07-08T12:00:00'
    BusinessError:
      description: Business rule rejected the request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            insufficientFunds:
              summary: Insufficient funds
              value:
                error: INSUFFICIENT_FUNDS
                status: 400
                message: Insufficient funds
                timestamp: '2026-07-08T12:00:00'
            blockedCard:
              summary: Card is not active
              value:
                error: CARD_NOT_ACTIVE
                status: 400
                message: Card must be active
                timestamp: '2026-07-08T12:00:00'
  schemas:
    Role:
      type: string
      enum: [ADMIN, USER]
    CardStatus:
      type: string
      enum: [ACTIVE, BLOCKED, EXPIRED]
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string, example: admin }
        password: { type: string, example: admin123 }
    RegisterRequest:
      type: object
      required: [username, password, fullName]
      properties:
        username: { type: string, example: ivan }
        password: { type: string, example: StrongPassword1 }
        fullName: { type: string, example: Ivan Petrov }
    UserCreateRequest:
      type: object
      required: [username, password, fullName, role]
      properties:
        username: { type: string }
        password: { type: string }
        fullName: { type: string }
        role: { $ref: '#/components/schemas/Role' }
        enabled: { type: boolean }
    UserUpdateRequest:
      type: object
      properties:
        fullName: { type: string }
        password: { type: string }
        role: { $ref: '#/components/schemas/Role' }
        enabled: { type: boolean }
    CardCreateRequest:
      type: object
      required: [number, ownerId, expirationDate, balance]
      properties:
        number: { type: string, example: '1234 5678 9012 3456' }
        ownerId: { type: string, format: uuid }
        expirationDate: { type: string, format: date }
        balance: { type: number, format: decimal, multipleOf: 0.01, example: 100.00 }
    CardUpdateRequest:
      type: object
      properties:
        expirationDate: { type: string, format: date }
        status: { $ref: '#/components/schemas/CardStatus' }
        balance: { type: number, format: decimal, multipleOf: 0.01 }
    TransferRequest:
      type: object
      required: [fromCardId, toCardId, amount]
      properties:
        fromCardId: { type: string, format: uuid }
        toCardId: { type: string, format: uuid }
        amount: { type: number, format: decimal, multipleOf: 0.01, example: 25.00 }
        description: { type: string, maxLength: 255 }
    AuthResponse:
      type: object
      properties:
        token: { type: string }
        tokenType: { type: string, example: Bearer }
        userId: { type: string, format: uuid }
        username: { type: string }
        role: { $ref: '#/components/schemas/Role' }
    UserResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        fullName: { type: string }
        role: { $ref: '#/components/schemas/Role' }
        enabled: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        deletedAt: { type: string, format: date-time, nullable: true }
        deletedBy: { type: string, format: uuid, nullable: true }
    CardResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        maskedNumber: { type: string, example: '**** **** **** 1234' }
        ownerId: { type: string, format: uuid }
        ownerName: { type: string }
        expirationDate: { type: string, format: date }
        status: { $ref: '#/components/schemas/CardStatus' }
        balance: { type: number, format: decimal, multipleOf: 0.01 }
        blockRequested: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        deletedAt: { type: string, format: date-time, nullable: true }
        deletedBy: { type: string, format: uuid, nullable: true }
    ErrorResponse:
      type: object
      properties:
        error: { type: string }
        status: { type: integer }
        message: { type: string }
        fieldErrors:
          type: object
          additionalProperties: { type: string }
        timestamp: { type: string, format: date-time }
